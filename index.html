<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0b">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title id="pageTitle">训练计时器</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Space+Grotesk:wght@700&family=Archivo+Black&family=Orbitron:wght@700&family=Righteous&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent-work: #00ff88;
            --accent-rest: #ffbb00;
            --accent-done: #00d2ff;
            --accent-ready: #ffffff;
            --glow-1: rgba(0, 255, 136, 0.05);
            --glow-2: rgba(0, 210, 255, 0.05);
            --glass-blur: 15px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 20% 30%, var(--glow-1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, var(--glow-2) 0%, transparent 40%);
            color: var(--text-primary);
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            overflow: hidden;
            transition: background-image 0.5s ease, background-color 0.5s ease;
        }

        body.no-glow {
            background-image: none !important;
        }

        /* App Container */
        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        /* Status Label */
        .status {
            font-size: clamp(1.5rem, 6vw, 3rem);
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .status.hold {
            color: var(--accent-work);
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }

        .status.rest {
            color: var(--accent-rest);
            text-shadow: 0 0 30px rgba(255, 187, 0, 0.3);
        }

        .status.done {
            color: var(--accent-done);
            text-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
        }

        .status.ready {
            color: var(--text-secondary);
        }

        /* Timer Display */
        .timer-wrapper {
            position: relative;
            margin: 1rem 0;
            transform: scale(1);
            transition: transform 0.3s ease;
        }

        .countdown {
            font-family: 'Space Grotesk', monospace;
            font-size: clamp(8rem, 35vw, 18rem);
            font-weight: 700;
            line-height: 0.9;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.03em;
            transition: all 0.4s ease;
        }

        .countdown.hold {
            color: var(--accent-work);
        }

        .countdown.rest {
            color: var(--accent-rest);
        }

        .countdown.done {
            color: var(--accent-done);
            font-size: clamp(6rem, 25vw, 12rem);
        }

        .countdown.ready {
            color: var(--text-primary);
        }

        /* Progress Info - Footer Style */
        .info-panel {
            position: fixed;
            bottom: 1.5rem;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 1.2rem;
            z-index: 50;
        }

        .project-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            border-right: 1px solid var(--border-color);
            padding-right: 1.2rem;
            cursor: pointer;
            transition: color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .project-name:hover {
            color: var(--text-primary);
        }

        .rep-info {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text-secondary);
        }

        /* Quick Switch Popover */
        .quick-switch {
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 35, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 0.5rem;
            min-width: 180px;
            max-width: 280px;
            opacity: 0;
            visibility: hidden;
            transform: translateX(-50%) translateY(6px);
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                visibility 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
        }

        .quick-switch::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 24px;
            width: 14px;
            height: 14px;
            background: #1e1e23;
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            border-radius: 0 0 3px 0;
            transform: rotate(45deg);
            clip-path: polygon(0% 100%, 100% 100%, 100% 0%);
        }

        .quick-switch.active {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .quick-switch-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .quick-switch-item {
            padding: 0.55rem 0.9rem;
            border-radius: 10px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .quick-switch-item:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
        }

        .quick-switch-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            font-weight: 700;
        }

        /* Progress Bar */
        .progress-box {
            width: 100%;
            max-width: 400px;
            height: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            margin-bottom: 3rem;
            overflow: hidden;
            opacity: 0;
            transform: scaleX(0.6);
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-box.visible {
            opacity: 1;
            transform: scaleX(1);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 5px;
            transition: width 1s linear, background 0.4s ease, box-shadow 0.4s ease;
        }

        .progress-bar.hold {
            background: var(--accent-work);
            box-shadow: 0 0 15px var(--accent-work);
        }

        .progress-bar.rest {
            background: var(--accent-rest);
            box-shadow: 0 0 15px var(--accent-rest);
        }

        .progress-bar.done {
            background: var(--accent-done);
            width: 100% !important;
        }

        /* Controls */
        .controls {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            align-items: center;
            margin-bottom: 4rem;
        }

        .btn {
            font-family: inherit;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 1rem 3rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 200px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: scale(0.92);
        }

        .btn-primary {
            background: var(--text-primary);
            color: var(--bg-color);
        }

        .btn-primary.pause {
            background: var(--accent-rest);
            color: var(--bg-color);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid white;
            font-size: 1rem;
            padding: 0.6rem 2rem;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            color: var(--text-primary);
            border-color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        #resetBtn {
            position: absolute;
            top: 100%;
            margin-top: 1rem;
            z-index: 5;
        }

        /* Settings Toggle */
        .settings-toggle {
            position: fixed;
            top: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            color: rgba(255, 255, 255, 0.82);
            transition: color 0.22s ease;
        }

        .settings-toggle:hover {
            color: #fff;
        }

        .settings-toggle svg {
            width: 26px;
            height: 26px;
        }

        /* Reports Toggle */
        .reports-toggle {
            position: fixed;
            top: 2rem;
            right: calc(4rem + 50px);
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            color: rgba(255, 255, 255, 0.82);
            transition: color 0.22s ease;
        }

        .reports-toggle:hover {
            color: #fff;
        }

        .reports-toggle svg {
            width: 26px;
            height: 26px;
        }

        /* Report View Styles */
        .reports-container {
            padding: 1rem 0;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.2rem;
            border-radius: 20px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.3rem;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 1.5rem 1.2rem;
            height: 180px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 8px;
            position: relative;
        }

        .chart-bar-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            height: 100%;
            justify-content: flex-end;
        }

        .chart-bar {
            width: 100%;
            max-width: 30px;
            background: var(--text-primary);
            border-radius: 6px 6px 2px 2px;
            min-height: 4px;
            transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .chart-bar.today {
            background: var(--accent-work);
            box-shadow: 0 0 15px var(--glow-1);
        }

        .chart-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
        }

        .log-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            margin-bottom: 0.8rem;
        }

        .log-time {
            font-family: 'Space Grotesk', monospace;
            font-size: 0.8rem;
            color: var(--text-secondary);
            width: 45px;
        }

        .log-info {
            flex: 1;
        }

        .log-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .log-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .report-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .report-nav-title-slot {
            position: relative;
            flex: 1;
            min-width: 0;
            height: 1.6em;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 0.6rem;
        }

        .report-nav-btn {
            background: transparent;
            border: none;
            width: 40px;
            height: 40px;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: filter 0.3s ease;
        }

        .report-nav-btn:hover:not(:disabled),
        .report-nav-btn:active:not(:disabled) {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            filter: brightness(1.5);
        }

        .report-nav-title {
            position: absolute;
            left: 50%;
            top: 50%;
            font-weight: 700;
            white-space: nowrap;
            transform: translate(-50%, -50%);
        }

        .report-nav-title.current {
            animation-duration: 0.28s;
            animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
            animation-fill-mode: both;
        }

        .report-nav-title.previous {
            animation-duration: 0.28s;
            animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
            animation-fill-mode: both;
        }

        .report-nav-title.current.from-left {
            animation-name: report-title-enter-from-left;
        }

        .report-nav-title.current.from-right {
            animation-name: report-title-enter-from-right;
        }

        .report-nav-title.previous.to-left {
            animation-name: report-title-exit-to-left;
        }

        .report-nav-title.previous.to-right {
            animation-name: report-title-exit-to-right;
        }

        @keyframes report-title-enter-from-left {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) translateX(-28px);
            }

            100% {
                opacity: 1;
                transform: translate(-50%, -50%) translateX(0);
            }
        }

        @keyframes report-title-enter-from-right {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) translateX(28px);
            }

            100% {
                opacity: 1;
                transform: translate(-50%, -50%) translateX(0);
            }
        }

        @keyframes report-title-exit-to-left {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) translateX(0);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) translateX(-28px);
            }
        }

        @keyframes report-title-exit-to-right {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) translateX(0);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) translateX(28px);
            }
        }

        .report-empty {
            text-align: center;
            padding: 3rem 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .guide-modal {
            z-index: 1400;
        }

        .guide-modal .modal-content {
            max-width: 420px;
        }

        .guide-panel-content {
            text-align: center;
            align-items: center;
            padding-top: 0;
            padding-bottom: calc(1.6rem + env(safe-area-inset-bottom, 0px));
        }

        .guide-illustration {
            width: 112px;
            height: 112px;
            object-fit: contain;
            margin: 0.2rem auto 1rem;
        }

        .guide-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.7rem;
        }

        .guide-desc {
            font-size: 0.92rem;
            line-height: 1.75;
            color: var(--text-secondary);
            max-width: 30ch;
            margin: 0 auto 1.3rem;
        }

        .guide-confirm-btn {
            min-width: 160px;
        }

        /* Modal Settings */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            pointer-events: none;
        }

        .modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0);
            transition: background 0.4s ease;
        }

        .modal.active {
            pointer-events: auto;
        }

        .modal.active .modal-backdrop {
            background: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1c1c1e;
            padding: 0 1.5rem calc(2rem + env(safe-area-inset-bottom, 0px));
            border-radius: 20px 20px 0 0;
            max-height: 90vh;
            overflow-y: auto;
            transform: translateY(calc(100% + 32px + env(safe-area-inset-bottom, 0px)));
            transition: transform 0.45s cubic-bezier(0.32, 0.72, 0, 1),
                        height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            max-width: 600px;
            margin: 0 auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
            overscroll-behavior: contain;
        }

        .modal-content.transitioning {
            overflow: hidden !important;
        }

        .modal-content::-webkit-scrollbar {
            display: none;
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .modal-handle {
            width: 36px;
            height: 5px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            margin: 10px auto 12px;
            flex-shrink: 0;
        }

        .modal-tabs {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.2rem;
            flex-shrink: 0;
            align-items: center;
            position: relative;
        }

        .modal-tabs-indicator {
            position: absolute;
            bottom: 0;
            height: 2px;
            background: var(--text-primary);
            border-radius: 1px;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .modal-tab-actions {
            margin-left: auto;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.55rem;
            min-width: 112px;
            flex-shrink: 0;
        }

        .profile-edit-toggle,
        .auto-queue-toggle {
            height: 37px;
            padding: 0.35rem 0.9rem;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.78rem;
            color: var(--text-secondary);
            transition: all 0.2s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .profile-edit-toggle {
            width: 37px;
            height: 37px;
            padding: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            visibility: visible;
            opacity: 1;
            transform: scale(1);
            transition: opacity 0.22s ease, transform 0.22s ease, filter 0.22s ease, background 0.22s ease, color 0.22s ease, visibility 0s linear 0s;
        }

        .profile-edit-toggle svg {
            width: 18px;
            height: 18px;
            display: block;
        }

        .profile-edit-toggle,
        .auto-queue-toggle {
            white-space: nowrap;
        }

        .profile-edit-toggle.active {
            background: rgba(255, 255, 255, 0.14);
            color: var(--text-primary);
            filter: brightness(1.2);
        }

        .profile-edit-toggle.is-hidden {
            visibility: hidden;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.88);
            transition: opacity 0.22s ease, transform 0.22s ease, filter 0.22s ease, background 0.22s ease, color 0.22s ease, visibility 0s linear 0.22s;
        }

        .profile-edit-toggle.instant-hide {
            visibility: hidden;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.88);
            transition: none !important;
        }

        .auto-queue-toggle.active {
            background: #ffbb00;
            color: #000;
        }

        .modal-tab {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-secondary);
            cursor: pointer;
            padding-bottom: 6px;
            transition: color 0.25s;
            white-space: nowrap;
        }

        .modal-tab.active {
            color: var(--text-primary);
        }

        .tab-page {
            display: none;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .tab-page.active {
            display: flex;
            opacity: 1;
        }

        .more-section {
            margin-bottom: 1.2rem;
        }

        .more-section-title {
            font-size: 0.78rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.6rem;
        }

        .more-options {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .more-option {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.88rem;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .more-option.active {
            background: var(--text-primary);
            color: #000;
        }

        .theme-options {
            display: flex;
            gap: 0.7rem;
            flex-wrap: wrap;
        }

        .theme-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2.5px solid transparent;
            transition: all 0.2s;
        }

        .theme-dot.active {
            border-color: var(--text-primary);
            transform: scale(1.15);
        }

        .font-options {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
        }

        .font-option {
            padding: 0.6rem 0;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.4rem;
            color: var(--text-secondary);
            text-align: center;
            transition: all 0.2s;
        }

        .font-option.active {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        /* Profile Selector */
        .profile-selector {
            display: flex;
            gap: 0.8rem;
            overflow-x: auto;
            padding: 1rem 0;
            margin-bottom: 1.5rem;
            scrollbar-width: none;
            -ms-overflow-style: none;
            align-items: center;
        }

        .profile-selector::-webkit-scrollbar {
            display: none;
        }

        .profile-chip {
            position: relative;
            height: 40px;
            padding: 0 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            white-space: nowrap;
            cursor: pointer;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            transform-origin: center;
            transition:
                width 0.32s cubic-bezier(0.4, 0, 0.2, 1),
                margin 0.32s cubic-bezier(0.4, 0, 0.2, 1),
                padding 0.32s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.22s ease,
                transform 0.32s cubic-bezier(0.4, 0, 0.2, 1),
                border-color 0.22s ease,
                background 0.22s ease,
                color 0.22s ease;
        }

        /* Targeted animations */
        .profile-chip.new-pop {
            animation: chip-pop-in 0.4s ease;
        }

        @keyframes chip-pop-in {
            0% {
                opacity: 0;
                transform: translateX(-10px);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .profile-chip.new-pop {
            animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        }

        .profile-chip.removing {
            pointer-events: none;
            width: 0 !important;
            min-width: 0 !important;
            margin-right: -0.8rem;
            padding-left: 0 !important;
            padding-right: 0 !important;
            border-width: 0;
            opacity: 0;
            transform: scale(0.86);
        }

        .chip-label {
            pointer-events: none;
            transition: opacity 0.18s ease, transform 0.18s ease;
        }

        .profile-chip.editing {
            padding-right: 2.4rem;
        }

        .chip-delete-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%) scale(0.85);
            width: 22px;
            height: 22px;
            border: none;
            background: transparent;
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            font-family: inherit;
            padding: 0;
            transition: opacity 0.2s ease, transform 0.2s ease, color 0.2s ease;
        }

        .chip-delete-btn svg {
            display: block;
            width: 14px;
            height: 14px;
        }

        .profile-chip.editing .chip-delete-btn {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(-50%) scale(1);
        }

        .profile-chip.active .chip-delete-btn {
            color: var(--bg-color);
        }

        .profile-chip.removing .chip-label,
        .profile-chip.removing .chip-delete-btn {
            opacity: 0;
            transform: translateY(-50%) scale(0.82);
        }

        .profile-chip.removing .chip-label {
            transform: scale(0.94);
        }

        .profile-chip.active {
            background: var(--text-primary);
            color: var(--bg-color);
            border-color: var(--text-primary);
            font-weight: 700;
        }

        .profile-chip.add-new {
            background: color-mix(in srgb, var(--accent-work) 15%, transparent);
            border: none;
            color: var(--accent-work);
            width: 40px;
            height: 40px;
            padding: 0;
            overflow: visible;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border-radius: 50%;
        }

        .profile-chip.add-new svg {
            display: block;
            width: 18px;
            height: 18px;
        }

        .setting-group {
            margin-bottom: 1.5rem;
        }

        .setting-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.6rem;
            font-weight: 600;
        }

        .range-label {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 0.45rem;
        }

        .range-label-value {
            color: var(--text-primary);
            font-weight: 700;
            cursor: pointer;
            min-width: 1.5em;
            text-align: left;
        }

        .range-label-value.feedback {
            animation: reps-value-feedback 0.18s ease-out;
        }

        @keyframes reps-value-feedback {
            0% {
                transform: scale(1);
                opacity: 0.9;
            }

            50% {
                transform: scale(1.08);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .setting-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #282829;
            padding: 0.8rem 1.2rem;
            border-radius: 14px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .setting-group input:focus {
            border-color: var(--accent-work);
        }

        .setting-group input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            border: none;
            padding: 0;
            margin: 0.8rem 0 0.4rem;
            outline: none;
        }

        .setting-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--accent-work);
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.3);
        }

        .voice-toggles {
            display: flex;
            gap: 0.6rem;
            margin-top: 0.2rem;
        }

        .voice-toggle {
            padding: 0.55rem 1.2rem;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .voice-toggle.active {
            background: #ffbb00;
            color: #000;
        }

        .modal-footer {
            margin-top: 1rem;
            display: flex;
            flex-direction: row;
            gap: 0.8rem;
            width: 100%;
        }

        .modal-footer .btn {
            flex: 1;
            min-width: 0;
            font-size: 1rem;
            padding: 0.8rem 0.5rem;
            white-space: nowrap;
            border-radius: 50px;
        }

        .modal-footer .btn-secondary {
            position: static;
            margin-top: 0;
            border-radius: 50px;
        }

        /* Animations */
        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.02);
            }

            100% {
                transform: scale(1);
            }
        }

        .timer-wrapper.animating {
            animation: pulse 1s infinite ease-in-out;
        }

        /* About Page Styles */
        .about-content {
            padding: 1rem 0;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .version-badge {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 700;
            width: fit-content;
        }

        .about-desc {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-secondary);
        }


        .contact-email:hover {
            color: var(--accent-work);
        }

        .about-contact {
            margin-top: 1.5rem;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .about-contact a {
            color: var(--text-primary);
            text-decoration: underline;
            transition: color 0.3s;
        }

        .about-contact a:hover {
            color: var(--accent-work);
        }

        @media (max-width: 480px) {
            .settings-toggle {
                top: 1.15rem;
                right: 1rem;
                width: 38px;
                height: 38px;
            }

            .reports-toggle {
                top: 1.15rem;
                right: 4.3rem;
                width: 38px;
                height: 38px;
            }

            .settings-toggle svg,
            .reports-toggle svg {
                width: 20px;
                height: 20px;
            }

            .profile-edit-toggle,
            .auto-queue-toggle {
                height: 32px;
            }

            .profile-edit-toggle {
                width: 32px;
                height: 32px;
            }

            .modal-tabs {

            }

            .modal-tab {
                font-size: 1rem;

            }

                font-size: 0.72rem;
            }

            .container {
                padding: 1rem;
            }

            .modal-content {
                padding: 0 1.2rem 1.5rem;
            }
        }
    </style>
</head>

    <script>
        // Tab switching
        function updateModalHeight(modalEl = document.getElementById('settingsModal')) {
            const content = modalEl.querySelector('.modal-content');
            const activePage = modalEl.querySelector('.tab-page.active') || modalEl.querySelector('.reports-container');
            if (!content || !activePage) return;
            if (window.matchMedia('(max-width: 480px)').matches) {
                content.classList.remove('transitioning');
                content.style.height = 'auto';
                return;
            }
            
            // Add transitioning class to hide scrollbar
            content.classList.add('transitioning');
            
            // Temporary height to calculate
            const headerHeight = modalEl.querySelector('.modal-handle').offsetHeight + 
                               modalEl.querySelector('.modal-tabs').offsetHeight + 40; // gaps
            const pageHeight = activePage.scrollHeight;
            const paddingBottom = 40 + (parseInt(getComputedStyle(content).paddingBottom) || 0);
            
            content.style.height = (headerHeight + pageHeight + paddingBottom) + 'px';
            
            // Remove after transition finishes (matching 0.3s transition)
            setTimeout(() => {
                content.classList.remove('transitioning');
            }, 400);
        }

        function moveIndicator() {
            const activeTab = document.querySelector('.modal-tab.active');
            const indicator = document.getElementById('tabIndicator');
            const tabs = activeTab && activeTab.parentElement;
            if (!activeTab || !indicator || !tabs) return;
            const tabsRect = tabs.getBoundingClientRect();
            const tabRect = activeTab.getBoundingClientRect();
            indicator.style.left = (tabRect.left - tabsRect.left) + 'px';
            indicator.style.width = tabRect.width + 'px';
        }

        function switchTab(tab) {
            const tabs = ['queue', 'more', 'about'];
            const index = tabs.indexOf(tab);
            currentSettingsTab = tab;
            
            document.querySelectorAll('.modal-tab').forEach((t, i) => t.classList.toggle('active', i === index));
            
            const pQueue = document.getElementById('tabQueue');
            const pMore = document.getElementById('tabMore');
            const pAbout = document.getElementById('tabAbout');
            
            [pQueue, pMore, pAbout].forEach(p => p.classList.remove('active'));
            
            const target = tab === 'queue' ? pQueue : (tab === 'more' ? pMore : pAbout);
            target.classList.add('active');
            
            if (tab === 'more') updateMorePage();
            updateProfileEditButtonVisibility();
            moveIndicator();
            
            // Trigger height transition after DOM update
            requestAnimationFrame(() => updateModalHeight(document.getElementById('settingsModal')));
        }

        // Reports View Management
        let reportPeriod = 'daily';
        let reportDateOffset = 0; // 0 for today/this week
        let reportTransitionDirection = 0;
        let reportRenderedTitle = '';

        function openReports() {
            if (state.phase !== 'ready' && state.phase !== 'done') pauseTimer();
            els.reportsModal.classList.add('active');
            requestAnimationFrame(() => {
                setReportPeriod('daily');
            });
        }

        function closeReports() {
            els.reportsModal.classList.remove('active');
            setTimeout(() => {
                document.querySelector('#reportsModal .modal-content').style.height = '';
            }, 450);
        }

        function setReportPeriod(period) {
            reportPeriod = period;
            reportDateOffset = 0;
            reportTransitionDirection = 0;
            
            // Fix ID mapping: monthly maps to Summary tab
            const tabId = period === 'monthly' ? 'tabReportSummary' : 'tabReport' + period.charAt(0).toUpperCase() + period.slice(1);
            
            document.querySelectorAll('#reportsModal .modal-tab').forEach(t => {
                t.classList.toggle('active', t.id === tabId);
            });
            
            moveReportIndicator();
            renderReports();
        }

        function moveReportIndicator() {
            const activeTab = document.querySelector('#reportsModal .modal-tab.active');
            const indicator = document.getElementById('reportTabIndicator');
            const tabs = activeTab && activeTab.parentElement;
            if (!activeTab || !indicator || !tabs) return;
            const tabsRect = tabs.getBoundingClientRect();
            const tabRect = activeTab.getBoundingClientRect();
            indicator.style.left = (tabRect.left - tabsRect.left) + 'px';
            indicator.style.width = tabRect.width + 'px';
        }

        function changeReportOffset(delta) {
            reportTransitionDirection = delta;
            reportDateOffset += delta;

        }

        function renderReportTitle(title) {
            const escapedCurrent = title;
            const escapedPrevious = reportRenderedTitle;

            if (!escapedPrevious || escapedPrevious === escapedCurrent || reportTransitionDirection === 0) {
                reportRenderedTitle = escapedCurrent;
                return `<div class="report-nav-title-slot"><span class="report-nav-title">${escapedCurrent}</span></div>`;
            }

            const previousClass = reportTransitionDirection < 0 ? 'report-nav-title previous to-left' : 'report-nav-title previous to-right';
            const currentClass = reportTransitionDirection < 0 ? 'report-nav-title current from-right' : 'report-nav-title current from-left';
            reportRenderedTitle = escapedCurrent;

            return `
                <div class="report-nav-title-slot">
                    <span class="${previousClass}">${escapedPrevious}</span>
                    <span class="${currentClass}">${escapedCurrent}</span>
                </div>
            `;
        }

            const log = {

                name: config.name || config.projectName,
                reps: state.currentRep,
                duration: calculateTotalDuration(config, state.currentRep),
                timestamp: Date.now()
            };
            
            const logs = JSON.parse(localStorage.getItem('workoutLogs') || '[]');
            logs.push(log);
            localStorage.setItem('workoutLogs', JSON.stringify(logs));
        }

        function calculateTotalDuration(config, reps) {
            // Simple calculation: (hold + rest) * completed reps
            // If it's a 'done' state, we count all reps.
            return reps * config.holdTime + (reps - 1) * config.restTime;
        }

            const dateStr = formatDate(targetDate);
            const displayDate = reportDateOffset === 0 ? '今日' : (reportDateOffset === -1 ? '昨日' : dateStr);

        function renderWeekly(container, logs) {
            const now = new Date();
            const weekStats = [];
            let maxMin = 0;
            
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(now.getDate() - i + (reportDateOffset * 7));
                const dStr = formatDate(d);
                const mins = Math.round(logs.filter(l => formatDate(new Date(l.timestamp)) === dStr).reduce((s, l) => s + l.duration, 0) / 60);
                weekStats.push({ day: d.toLocaleDateString([], { weekday: 'narrow' }), mins, isToday: dStr === formatDate(now) });
                if (mins > maxMin) maxMin = mins;
            }
            
            const startDay = new Date(); startDay.setDate(now.getDate() - 6 + (reportDateOffset * 7));
            const endDay = new Date(); endDay.setDate(now.getDate() + (reportDateOffset * 7));
            const dateRange = `${startDay.getMonth()+1}/${startDay.getDate()} - ${endDay.getMonth()+1}/${endDay.getDate()}`;
            
            let html = `
                <div class="report-nav">
                    <button class="report-nav-btn" onclick="changeReportOffset(-1)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px;"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    </button>
                    ${renderReportTitle(dateRange)}
                    <button class="report-nav-btn" onclick="changeReportOffset(1)" ${reportDateOffset >= 0 ? 'disabled style="opacity:0.3"' : ''}>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px;"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                </div>
                <div class="chart-container">
            `;
            
            weekStats.forEach(s => {
                const height = maxMin === 0 ? 4 : Math.max(4, (s.mins / (maxMin * 1.1)) * 100);
                html += `
                    <div class="chart-bar-wrapper">
                        <div class="chart-bar ${s.isToday ? 'today' : ''}" style="height:${height}%"></div>
                        <div class="chart-label">${s.day}</div>
                    </div>
                `;
            });
            
            const totalMins = weekStats.reduce((s, d) => s + d.mins, 0);
            html += `</div>
                <div class="stat-grid" style="margin-top:1rem">
                    <div class="stat-card"><div class="stat-value">${totalMins}</div><div class="stat-label">周总分钟</div></div>
                    <div class="stat-card"><div class="stat-value">${Math.round(totalMins/7)}</div><div class="stat-label">日均分钟</div></div>
                </div>
            `;
            container.innerHTML = html;
        }

        function renderMonthly(container, logs) {

            const targetYear = targetDate.getFullYear();

            });
            
            const totalMins = Math.round(monthLogs.reduce((s, l) => s + l.duration, 0) / 60);

            const uniqueDays = new Set(monthLogs.map(l => formatDate(new Date(l.timestamp)))).size;
            
            const counts = {};

        function setRepsInputValue(value) {
            const nextValue = String(value);
            els.inputs.reps.value = nextValue;

        }

        function animateRepsInputTo(targetValue, immediate = false) {
            if (repsAnimationFrame) {
                cancelAnimationFrame(repsAnimationFrame);
                repsAnimationFrame = null;
            }

            const target = Number(targetValue);
            if (immediate || !Number.isFinite(target)) {
                setRepsInputValue(targetValue);
                return;
            }

            const start = Number(els.inputs.reps.value || target);
            if (!Number.isFinite(start) || start === target) {
                setRepsInputValue(target);
                return;
            }

            const duration = 180;
            const startAt = performance.now();

            const tick = (now) => {
                const progress = Math.min(1, (now - startAt) / duration);
                const eased = 1 - Math.pow(1 - progress, 3);
                const current = Math.round(start + (target - start) * eased);
                setRepsInputValue(current);
                if (progress < 1) {
                    repsAnimationFrame = requestAnimationFrame(tick);
                } else {
                    setRepsInputValue(target);
                    repsAnimationFrame = null;
                }
            };

            repsAnimationFrame = requestAnimationFrame(tick);
        }

                try {

                    profiles = [{ ...old, id: 'migrated_' + Date.now() }];
                    activeProfileId = profiles[0].id;
                    localStorage.setItem('timerProfiles', JSON.stringify(profiles));
                    localStorage.setItem('activeProfileId', activeProfileId);
                    localStorage.removeItem('timerConfig');

                // Reset new-pop flag after rendering so it doesn't repeat
                if (isNew) {
                    setTimeout(() => { chip.classList.remove('new-pop'); latestAddedId = null; }, 500);

                const label = document.createElement('span');
                label.className = 'chip-label';

                deleteBtn.onclick = (e) => {

                    deleteProfile(p.id);

                chip.appendChild(label);

            els.projectNameDisplay.textContent = config.name || config.projectName;
            els.totalRepsDisplay.textContent = config.totalReps;
            document.getElementById('pageTitle').textContent = (config.name || config.projectName) + ' - 计时器';
            els.inputs.name.value = config.name || config.projectName;
            els.inputs.hold.value = config.holdTime;
            els.inputs.rest.value = config.restTime;
            animateRepsInputTo(config.totalReps);

            // Add auto-save listeners if not already added
            if (!els.inputs.name._autoSave) {
                [els.inputs.name, els.inputs.hold, els.inputs.rest, els.inputs.reps].forEach(el => {
                    el.addEventListener('input', saveSettings);
                });
                els.inputs.name._autoSave = true;
            }
        }

        function addNewProfile() {
            const newId = 'p_' + Date.now();
            profiles.push({ id: newId, name: '新计划 ' + (profiles.length + 1), holdTime: 10, restTime: 5, totalReps: 10 });
            activeProfileId = newId;
            latestAddedId = newId; // Mark for animation
            saveProfilesToStorage();
            renderProfileChips();
            applyActiveProfile();
            resetTimer();
        }

        function deleteProfile(id) {
            const index = profiles.findIndex(p => p.id === id);
            const chipEls = els.profileSelector.querySelectorAll('.profile-chip');
            const chipToAnimate = chipEls[index];

            if (chipToAnimate) {
                if (profiles.length === 2 && isProfileEditMode) {
                    els.editProfilesBtn.classList.add('instant-hide');
                    els.editProfilesBtn.classList.add('is-hidden');
                    els.editProfilesBtn.classList.remove('active');
                    isProfileEditMode = false;
                    applyProfileEditMode();
                }
                chipToAnimate.style.width = chipToAnimate.offsetWidth + 'px';
                chipToAnimate.style.flexShrink = '0';
                chipToAnimate.classList.add('removing');
                setTimeout(() => finalizeDelete(id), 320);
            } else {
                finalizeDelete(id);
            }
        }

        function finalizeDelete(id) {
            const index = profiles.findIndex(p => p.id === id);
            profiles.splice(index, 1);
            if (activeProfileId === id) activeProfileId = profiles[0].id;
            saveProfilesToStorage();
            renderProfileChips();
            applyActiveProfile();
            resetTimer();
        }

        function saveProfilesToStorage() {
            localStorage.setItem('timerProfiles', JSON.stringify(profiles));
            localStorage.setItem('activeProfileId', activeProfileId);
        }

        function saveSettings() {
            const config = getActiveConfig();
            config.name = els.inputs.name.value.trim() || '未命名训练';
            config.projectName = config.name;
            config.holdTime = parseInt(els.inputs.hold.value) || 10;
            config.restTime = parseInt(els.inputs.rest.value) || 0;
            config.totalReps = parseInt(els.inputs.reps.value) || 1;
            els.inputs.repsDisplay.textContent = config.totalReps;
            saveProfilesToStorage();
            applyActiveProfileDetails(); 
            if (state.phase === 'ready' || state.phase === 'done') resetTimer();
        }

        // Helper to update only UI details without re-binding listeners
        function applyActiveProfileDetails() {
            const config = getActiveConfig();
            els.projectNameDisplay.textContent = config.name || config.projectName;
            els.totalRepsDisplay.textContent = config.totalReps;
            renderProfileChips();
        }

        function updateDisplay() {
            els.countdown.textContent = state.timeLeft;
            els.currentRep.textContent = state.currentRep;
            els.status.className = 'status ' + state.phase;
            els.countdown.className = 'countdown ' + state.phase;
            els.progressBar.className = 'progress-bar ' + state.phase;
            const config = getActiveConfig();
            if (state.phase === 'hold') {
                els.status.textContent = '训 练 中';
                els.progressBar.style.width = ((config.holdTime - state.timeLeft) / config.holdTime) * 100 + '%';
                els.timerWrapper.classList.add('animating');
                if (!state.isPaused) { els.mainBtn.textContent = '暂 停'; els.mainBtn.classList.add('pause'); }
            } else if (state.phase === 'rest') {
                els.status.textContent = '休 息';
                els.progressBar.style.width = ((config.restTime - state.timeLeft) / config.restTime) * 100 + '%';
                els.timerWrapper.classList.remove('animating');
                if (!state.isPaused) { els.mainBtn.textContent = '暂 停'; els.mainBtn.classList.add('pause'); }
            } else if (state.phase === 'prepare') {
                els.status.textContent = '准 备';
                els.countdown.textContent = state.timeLeft;
                els.progressBar.style.width = '0%';
                els.timerWrapper.classList.remove('animating');
                els.mainBtn.textContent = '准 备...';
            } else if (state.phase === 'done') {
                els.status.textContent = '任 务 完 成 ！';
                els.countdown.textContent = 'FIN';
                els.timerWrapper.classList.remove('animating');
                els.mainBtn.textContent = '再练一局';
                els.mainBtn.classList.remove('pause');
            } else if (state.phase === 'ready') {
                els.status.textContent = '准备开始';
                els.countdown.textContent = config.holdTime;
                els.progressBar.style.width = '0%';
                els.timerWrapper.classList.remove('animating');
                els.mainBtn.textContent = '开 始';
                els.mainBtn.classList.remove('pause');
            }
            if (state.isPaused) { els.mainBtn.textContent = '继 续'; els.mainBtn.classList.remove('pause'); }
            const showBar = displaySettings.progress && state.phase !== 'ready';
            document.getElementById('progressBox').classList.toggle('visible', showBar);
        }

        let audioCtx = null;
        function getAudioContext() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }

        function beep(freq, duration, volume = 0.2, type = 'sine') {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(volume, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration / 1000);
                osc.start();
                osc.stop(ctx.currentTime + duration / 1000);
            } catch (e) { console.error("Beep Error:", e); }
        }

        // 中文语音播报
        function warmupSpeech() {
            if (!('speechSynthesis' in window)) return;
            const utter = new SpeechSynthesisUtterance('');
            utter.volume = 0;
            window.speechSynthesis.speak(utter);
        }
        function speak(text) {
            try {
                if (!('speechSynthesis' in window)) return;
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'zh-CN';
                utter.rate = 1.1;
                utter.volume = 0.9;
                // 根据性别选择音高
                utter.pitch = voiceSettings.gender === 'female' ? 1.15 : 0.9;
                const voices = window.speechSynthesis.getVoices();
                const zhVoices = voices.filter(v => v.lang.startsWith('zh'));
                if (zhVoices.length) {
                    const preferred = zhVoices.find(v => voiceSettings.gender === 'female' ? /female|女/i.test(v.name) : /male|男/i.test(v.name));
                    utter.voice = preferred || zhVoices[0];
                }
                window.speechSynthesis.speak(utter);
            } catch (e) { console.error("Speech Error:", e); }
        }

        function playSound(type) {
            switch (type) {
                case 'countdown':
                    // 倒计时：短促高音滴答声
                    beep(1000, 100, 0.2, 'sine');
                    break;
                case 'start':
                    // 开始坚持：上升双音 + 语音
                    beep(600, 150, 0.25, 'sine');
                    setTimeout(() => beep(900, 150, 0.25, 'sine'), 160);
                    setTimeout(() => beep(1200, 300, 0.3, 'sine'), 330);
                    if (voiceSettings.start) speak('开始');
                    break;
                case 'transition':
                    // 进入休息：下降音阶 + 语音
                    beep(800, 150, 0.2, 'triangle');
                    setTimeout(() => beep(600, 150, 0.2, 'triangle'), 170);
                    setTimeout(() => beep(400, 300, 0.2, 'triangle'), 350);
                    if (voiceSettings.rest) speak('休息');
                    break;
                case 'done':
                    // 全部完成：庆祝音效 + 语音
                    beep(800, 150, 0.25, 'sine');
                    setTimeout(() => beep(1000, 150, 0.25, 'sine'), 170);
                    setTimeout(() => beep(1200, 150, 0.25, 'sine'), 340);
                    setTimeout(() => beep(1600, 500, 0.35, 'sine'), 510);
                    speak('训练完成');
                    break;
            }
        }

        function tick() {
            if (state.timeLeft > 0) { if (state.timeLeft <= 3) playSound('countdown'); state.timeLeft--; }
            const config = getActiveConfig();
            if (state.timeLeft <= 0) {
                if (state.phase === 'hold') {
                    if (state.currentRep >= config.totalReps) { playSound('done'); endTimer(); return; }
                    playSound('transition'); state.phase = 'rest'; state.timeLeft = config.restTime;
                } else if (state.phase === 'rest' || state.phase === 'prepare') {
                    playSound('start'); if (state.phase === 'rest') state.currentRep++; state.phase = 'hold'; state.timeLeft = config.holdTime;
                }
            }
            updateDisplay();
        }

        function toggleTimer() {
            if (state.phase === 'ready' || state.phase === 'done') prepareTimer();
            else if (state.isPaused) resumeTimer();
            else pauseTimer();
        }

        // Wake Lock - 防止计时期间锁屏
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
            } catch (e) { }
        }
        function releaseWakeLock() {
            if (wakeLock) { wakeLock.release(); wakeLock = null; }
        }

        function prepareTimer() {
            warmupSpeech(); requestWakeLock();
            state.phase = 'prepare'; state.timeLeft = 3; state.currentRep = 1; state.isPaused = false;
            els.mainBtn.textContent = '准 备...'; els.mainBtn.classList.add('pause'); els.resetBtn.style.display = 'block';
            updateDisplay(); state.intervalId = setInterval(tick, 1000);
        }

        function pauseTimer() { state.isPaused = true; els.mainBtn.textContent = '继 续'; els.mainBtn.classList.remove('pause'); clearInterval(state.intervalId); state.intervalId = null; releaseWakeLock(); }
        function resumeTimer() { state.isPaused = false; els.mainBtn.textContent = '暂 停'; els.mainBtn.classList.add('pause'); state.intervalId = setInterval(tick, 1000); requestWakeLock(); }
        function endTimer() {
            clearInterval(state.intervalId); state.intervalId = null;
            // 连练模式：尝试跳到下一个任务
            if (displaySettings.autoQueue && profiles.length > 1) {
                const idx = profiles.findIndex(p => p.id === activeProfileId);
                const nextIdx = idx + 1;
                if (nextIdx < profiles.length) {
                    playSound('done');
                    speak((profiles[nextIdx].name || profiles[nextIdx].projectName) + '，准备');
                    activeProfileId = profiles[nextIdx].id;
                    localStorage.setItem('activeProfileId', activeProfileId);
                    applyActiveProfile();
                    renderProfileChips();
                    renderQuickSwitchList();
                    prepareTimer();
                    return;
                }
            }
            // 全部完成或未开启连练模式
            if (displaySettings.autoQueue && profiles.length > 1) {
                // 整个队列跑完，回到第一个任务以便重新开始
                activeProfileId = profiles[0].id;
                localStorage.setItem('activeProfileId', activeProfileId);
                applyActiveProfile(); renderProfileChips(); renderQuickSwitchList();
            }
            state.phase = 'done'; state.timeLeft = 0;
            els.mainBtn.textContent = '再练一局'; els.mainBtn.classList.remove('pause');
            els.resetBtn.style.display = 'block'; 
            logWorkout(); // New: Log workout session
            playSound('done'); updateDisplay(); releaseWakeLock();
        }
        function resetTimer() { clearInterval(state.intervalId); state.intervalId = null; state.phase = 'ready'; state.currentRep = 1; state.timeLeft = getActiveConfig().holdTime; state.isPaused = false; els.mainBtn.textContent = '开 始'; els.mainBtn.classList.remove('pause'); els.resetBtn.style.display = 'none'; updateDisplay(); releaseWakeLock(); }
        function openModal() { 
            if (state.phase !== 'ready' && state.phase !== 'done') pauseTimer(); 
            applyActiveProfile(); 
            if (settingsModalCleanupTimer) {
                clearTimeout(settingsModalCleanupTimer);
                settingsModalCleanupTimer = null;
            }
            const content = els.modal.querySelector('.modal-content');
            content.classList.remove('transitioning');
            content.style.height = '';
            els.modal.classList.add('active'); 
            
            // Set initial height for slide-up
            content.style.height = 'auto'; 
            
            requestAnimationFrame(() => {
                switchTab('queue');
            });
        }
        function closeModal() { 
            els.modal.classList.remove('active'); 
            clearDeleteMode(); 
            // Reset height to avoid interference next time
            settingsModalCleanupTimer = setTimeout(() => {
                const content = els.modal.querySelector('.modal-content');
                content.classList.remove('transitioning');
                content.style.height = '';
                settingsModalCleanupTimer = null;
            }, 450);
        }

        // Swipe down to dismiss
        (function () {
            const sheet = document.querySelector('.modal-content');
            let startX = 0, startY = 0, currentY = 0, dragging = false, decided = false;
            sheet.addEventListener('touchstart', (e) => {
                if (sheet.scrollTop > 0 || e.target.closest('input[type="range"]')) {
                    decided = true; dragging = false; return;
                }
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                dragging = false;
                decided = false;
                currentY = 0;
            });
            sheet.addEventListener('touchmove', (e) => {
                if (decided && !dragging) return;
                const dx = Math.abs(e.touches[0].clientX - startX);
                const dy = e.touches[0].clientY - startY;
                if (!decided) {
                    if (dx + Math.abs(dy) < 10) return; // too small to decide
                    decided = true;
                    dragging = dy > 0 && Math.abs(dy) > dx * 1.5; // must be clearly vertical downward
                    if (dragging) sheet.style.transition = 'none';
                    else return;
                }
                currentY = Math.max(0, e.touches[0].clientY - startY);
                sheet.style.transform = `translateY(${currentY}px)`;
            });
            sheet.addEventListener('touchend', () => {
                if (!dragging) return;
                dragging = false;
                decided = false;
                sheet.style.transition = '';
                if (currentY > 100) { closeModal(); }
                sheet.style.transform = '';
                currentY = 0;
            });
        })();
        init();
        applyFont();

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
